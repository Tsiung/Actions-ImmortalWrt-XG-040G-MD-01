name: XG-040G-MD Multi-Branch & Multi-Config

on:
  workflow_dispatch:
    inputs:
      branch_filter:
        description: '选择要编译的分支'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - master
          - openwrt-25.12

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  DEVICE_TARGET: airoha
  DEVICE_SUBTARGET: an7581
  TZ: Asia/Shanghai

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 4            # 同时运行的任务数
      matrix:
        # 根据用户输入动态生成分支列表
        branch: ${{ fromJSON(
          github.event.inputs.branch_filter == 'all' && '["master", "openwrt-25.12"]' ||
          (github.event.inputs.branch_filter == 'master' && '["master"]') ||
          '["openwrt-25.12"]'
        ) }}
        config_type: [base, openclash, ksambd, samba4]
        include:
          # 配置类型对应的 seed 文件和 Release 后缀
          - config_type: base
            seed_file: seed-01.config
            release_suffix: Base
          - config_type: openclash
            seed_file: seed-02.config
            release_suffix: OpenClash
          - config_type: ksambd
            seed_file: seed-03.config
            release_suffix: OpenClash-P910nd-KSMBD
          - config_type: samba4
            seed_file: seed-04.config
            release_suffix: OpenClash-P910nd-Samba4

    runs-on: ubuntu-latest

    steps:
      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo timedatectl set-timezone "$TZ"

      - name: 扩展磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: 检出当前仓库（存放 seed 文件和 diy-part1.sh）
        uses: actions/checkout@v4

      - name: 根据分支设置变量
        run: |
          if [[ "${{ matrix.branch }}" == "master" ]]; then
            echo "official_branch=master" >> $GITHUB_ENV
            echo "user_branch_suffix=master-XG-040G-MD" >> $GITHUB_ENV
          else
            echo "official_branch=openwrt-25.12" >> $GITHUB_ENV
            echo "user_branch_suffix=openwrt-25.12-XG-040G-MD" >> $GITHUB_ENV
          fi

      - name: 克隆 ImmortalWrt 源码（指定分支）
        run: |
          git clone "$REPO_URL" -b "${{ env.official_branch }}" openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      - name: 应用设备补丁
        run: |
          chmod +x $GITHUB_WORKSPACE/diy-part1.sh
          cd $OPENWRT_PATH
          $GITHUB_WORKSPACE/diy-part1.sh "${{ env.user_branch_suffix }}"

      - name: 生成构建日期及变量
        run: |
          BUILD_DATE=$(TZ=Asia/Shanghai date +"%Y%m%d")
          BUILD_TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          RELEASE_TAG="XG-040G-MD-${{ matrix.branch }}-${{ matrix.release_suffix }}-${BUILD_DATE}-${{ github.run_number }}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: 加载对应种子配置
        run: |
          cd $OPENWRT_PATH
          cp $GITHUB_WORKSPACE/${{ matrix.seed_file }} .config
          make defconfig

      - name: 恢复 DL 缓存（按分支区分）
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENWRT_PATH }}/dl
          key: dl-${{ matrix.branch }}-${{ hashFiles('openwrt/feeds.conf*', 'openwrt/.config') }}
          restore-keys: |
            dl-${{ matrix.branch }}-

      - name: 下载软件包
        run: |
          cd $OPENWRT_PATH
          make download -j8
          find dl -size -1024c -delete

      - name: 编译固件
        id: compile
        run: |
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 整理产物
        if: steps.compile.outputs.status == 'success'
        run: |
          cd $OPENWRT_PATH/bin/targets/*/*
          VERSION_KERNEL=$(find -type f -name "*.manifest" -exec grep -oP '^kernel - \K.*?(?=~|-\d+-)' {} \; | head -1)
          echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV
          cp $OPENWRT_PATH/.config build.config
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

      - name: 发布固件到独立 Release
        if: steps.compile.outputs.status == 'success'
        uses: ncipollo/release-action@v1
        with:
          name: XG-040G-MD-${{ matrix.branch }}-${{ matrix.release_suffix }}-${{ env.BUILD_DATE }}
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE_PATH }}/*.bin,${{ env.FIRMWARE_PATH }}/*.manifest,${{ env.FIRMWARE_PATH }}/build.config
          body: |
            ## XG-040G-MD ImmortalWrt 固件
            - **分支**: ${{ matrix.branch }}
            - **配置**: ${{ matrix.release_suffix }}
            - **上游分支**: ${{ env.official_branch }}
            - **编译时间**: ${{ env.BUILD_TIME }}
            - **内核版本**: ${{ env.VERSION_KERNEL }}

            ### 🗂️ 文件说明
            - `*-squashfs-sysupgrade.bin` → 在已有 OpenWrt/ImmortalWrt 中升级
            - `*-squashfs-factory.bin` → 从原厂系统首次刷机
            - `build.config` → 本次编译使用的完整配置文件

            ### 🔐 默认信息
            | 项目 | 默认值 |
            |------|--------|
            | **管理地址** | 192.168.1.1 |
            | **用户名** | root |
            | **密码** | *无（首次登录后请务必设置）* |

            ### ⚠️ 注意事项
            - 刷机前请核对设备型号，错误固件可能导致变砖。
            - 建议在刷机前备份原厂固件和重要数据。
            - 本固件为自动编译生成，请仔细核对文件完整性。

            ---
            *由 GitHub Actions 自动构建 | Release ${{ env.RELEASE_TAG }}*